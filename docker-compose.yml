version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vgdb-app
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./app:/app/app
      - ./config:/app/config
      - ./routes:/app/routes
      - ./resources:/app/resources
      - ./storage:/app/storage
      - ./bootstrap/cache:/app/bootstrap/cache
      - ./database:/app/database
    networks:
      - vgdb
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    container_name: vgdb-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./:/app
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - vgdb

  redis:
    image: redis:7-alpine
    container_name: vgdb-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - vgdb

networks:
  vgdb:
    driver: bridge
