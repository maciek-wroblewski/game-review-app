version: '3.8'

services:
  app:
    build: .
    container_name: mygamelist-app
    working_dir: /app
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=sqlite
      - CACHE_STORE=database
      - QUEUE_CONNECTION=database
      - SESSION_DRIVER=database
    volumes:
      - ./:/app
      - ./storage:/app/storage
      - ./bootstrap/cache:/app/bootstrap/cache
      - ./database:/app/database
    ports:
      - "9000:9000"
    networks:
      - mygamelist
    depends_on:
      - nginx
    develop:
      watch:
        - action: sync
          path: ./app
          target: /app/app
        - action: sync
          path: ./resources
          target: /app/resources
        - action: sync
          path: ./routes
          target: /app/routes
        - action: sync
          path: ./config
          target: /app/config
        - action: rebuild
          path: ./composer.json

  nginx:
    image: nginx:alpine
    container_name: mygamelist-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/app
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - mygamelist
    depends_on:
      - app

  node:
    image: node:20-alpine
    container_name: mygamelist-node
    working_dir: /app
    volumes:
      - ./:/app
    command: npm run dev
    ports:
      - "5173:5173"
    networks:
      - mygamelist

networks:
  mygamelist:
    driver: bridge
