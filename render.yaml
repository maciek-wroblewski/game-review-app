databases:
  - name: game-review-db
    databaseName: game_review
    user: admin
    plan: free

services:
  - type: web
    name: game-review-app
    env: php
    plan: free
    buildCommand: "bash render-build.sh"
    startCommand: "vendor/bin/heroku-php-apache2 public/"
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: "https://game-review-app.onrender.com" # You can update this to your actual Render URL
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: game-review-db
          property: connectionString
